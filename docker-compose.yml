version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: expensio_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: expensio
      MYSQL_USER: expensio
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - expensio
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: expensio_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: expensio
      PMA_PASSWORD: secret
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - expensio

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expensio_backend
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_NAME: Expensio
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8000"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: expensio
      DB_USERNAME: expensio
      DB_PASSWORD: secret
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      SANCTUM_STATEFUL_DOMAINS: "localhost:5173,localhost:3000"
      FRONTEND_URL: "http://localhost:5173"
    volumes:
      - ./backend:/var/www
      - vendor_data:/var/www/vendor
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - expensio
    command: >
      bash -c "
        composer install --no-interaction --prefer-dist --optimize-autoloader &&
        php artisan key:generate --force &&
        php artisan config:clear &&
        php artisan cache:clear &&
        php artisan migrate --force &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expensio_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: "http://localhost:8000/api"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - node_modules_data:/app/node_modules
    networks:
      - expensio
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

networks:
  expensio:
    driver: bridge

volumes:
  mysql_data:
  vendor_data:
  node_modules_data:
